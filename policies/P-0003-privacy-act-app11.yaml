code: P-0003
version: "1.0"
title: Security of Personal Information
short_title: Privacy Act APP 11
jurisdiction: AU
authority: Office of the Australian Information Commissioner
source_url: https://www.oaic.gov.au/privacy/australian-privacy-principles/australian-privacy-principles-guidelines/chapter-11-app-11-security-of-personal-information
effective_from: "1988-01-01"
effective_to: null
summary: >
  APP 11 requires reasonable steps to protect personal information from
  misuse, interference, loss, and unauthorised access. OAIC guidance
  names logs and audit trails as part of "reasonable steps". The Privacy
  and Other Legislation Amendment Act 2024 strengthened APP 11 wording
  as of 2025; a statutory tort for serious privacy breaches is live
  from 10 June 2025.
applies_to:
  - contact
  - export
  - import
  - audit
  - payroll
severity: mandatory
tags:
  - privacy
  - personal-information
  - security
  - app-11
